<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Get in touch with Anshu Kumar for freelance web development, internships, or collaborations.">
    <title>Contact | Anshu Kumar - Aspiring Full Stack Developer</title>

    <!-- Prevent Theme Flash -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="photo/aklogo.png">
</head>

<body>
    <div id="preloader">
        <div class="spinner"></div>
    </div>
    <header>
        <nav>
            <div class="logo-group">
                <button class="hamburger-menu" title="Open menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <img src="photo/aklogo.png" alt="Anshu Kumar Logo" class="logo-img">
                <div class="logo">Portfolio</div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="credentials.html">Credentials</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="cv">
                <a href="photo/cv.pdf" class="cv-button" rel="noopener">
                    <i class="fa-solid fa-download"></i>CV
                </a>
                <!-- Theme Toggle -->
                <button id="themeToggle" class="theme-toggle" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Scroll to Top Button -->
    <button id="scrollTopBtn" class="scroll-top-btn" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>


    <main>
        <!-- Contact Section -->
        <section id="contact" class="fade-in">
            <h2>Get In Touch</h2>
            <p>Have a project in mind or just want to say hello? Fill out the form below.</p>

            <form id="contact-form" action="https://formspree.io/f/mjkoelvr" method="POST">
                <input type="text" name="name" placeholder="Enter Your Name" required>
                <input type="text" name="subject" placeholder="Subject" required>
                <input type="number" name="phone" placeholder="Mobile Number" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
                <button type="submit" class="cta-button">Send Message</button>
            </form>
            <div id="form-status"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
